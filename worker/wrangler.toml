name = "depanalyzer"
main = "index.js"
compatibility_date = "2025-01-01"

[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_YOUR_PREVIEW_KV_NAMESPACE_ID"

# Set secrets (run these commands, then `wrangler deploy`):
#
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put LEMONSQUEEZY_WEBHOOK_SECRET   <- only needed for paid tier
#
# Create a KV namespace first:
#   wrangler kv:namespace create KV
# Then paste the returned id values above.
